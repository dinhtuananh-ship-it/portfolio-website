<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng 20/10 💐</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: background 2s ease-in-out;
  }

  h1 {
    color: #fff;
    font-size: 3em;
    text-align: center;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #ff5fa2, 0 0 30px #ff5fa2; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ff1d8e, 0 0 40px #ff1d8e; }
  }

  .message {
    color: #fff;
    font-size: 1.5em;
    text-align: center;
    max-width: 80%;
    animation: fadeInUp 2s ease-in-out;
  }

  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(50px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .heart, .flower {
    position: absolute;
    opacity: 0.8;
  }

  .heart {
    color: #ff5fa2;
    font-size: 24px;
    animation: floatUp 5s linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
  }

  .flower {
    font-size: 20px;
    color: #fff;
    animation: fallDown 6s linear infinite;
  }

  @keyframes fallDown {
    0% { transform: translateY(-10vh) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(360deg); }
  }

  #music-btn, #next-btn {
    position: fixed;
    bottom: 20px;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    color: #ff5fa2;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s;
  }

  #music-btn:hover, #next-btn:hover {
    transform: scale(1.1);
  }

  #music-btn { right: 20px; }
  #next-btn { left: 20px; }

  .fade {
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>
  <h1 id="title">💐 Chúc Mừng Ngày Phụ Nữ Việt Nam 20/10 💖</h1>
  <p class="message" id="msg">Chúc tất cả những người phụ nữ xinh đẹp luôn rạng rỡ, hạnh phúc và được yêu thương! 🌸</p>

  <audio id="bg-music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_11902f6b62.mp3?filename=romantic-piano-melody-2393.mp3" type="audio/mpeg">
  </audio>

  <button id="music-btn">🎵</button>
  <button id="next-btn">💌</button>

  <script>
    // Hiệu ứng trái tim và hoa
    const hearts = ["💖", "💘", "💝", "💞", "💓", "💗"];
    const flowers = ["🌸", "🌷", "🌹", "🌼", "🌻", "💮"];

    function createElement(arr, className) {
      const el = document.createElement("div");
      el.className = className;
      el.textContent = arr[Math.floor(Math.random() * arr.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.animationDuration = (3 + Math.random() * 4) + "s";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    setInterval(() => createElement(hearts, "heart"), 300);
    setInterval(() => createElement(flowers, "flower"), 500);

    // Nhạc nền
    const btn = document.getElementById("music-btn");
    const music = document.getElementById("bg-music");
    let playing = false;

    btn.onclick = () => {
      if (!playing) {
        music.play();
        btn.textContent = "⏸️";
        playing = true;
      } else {
        music.pause();
        btn.textContent = "🎵";
        playing = false;
      }
    };

    // Chuyển sang phần tiếp theo
    const next = document.getElementById("next-btn");
    const title = document.getElementById("title");
    const msg = document.getElementById("msg");
    let stage = 1;

    next.onclick = () => {
      document.body.classList.add("fade");
      setTimeout(() => {
        if (stage === 1) {
          title.textContent = "💖 Gửi đến người phụ nữ tuyệt vời 💌";
          msg.textContent = "Cảm ơn vì đã luôn dịu dàng, mạnh mẽ và là nguồn cảm hứng mỗi ngày 🌷";
          document.body.style.background = "linear-gradient(135deg, #fbc2eb, #a6c1ee)";
          stage = 2;
        } else {
          title.textContent = "💐 Chúc Mừng Ngày Phụ Nữ Việt Nam 20/10 💖";
          msg.textContent = "Chúc tất cả những người phụ nữ xinh đẹp luôn rạng rỡ, hạnh phúc và được yêu thương! 🌸";
          document.body.style.background = "linear-gradient(135deg, #ff9a9e, #fad0c4)";
          stage = 1;
        }
        document.body.classList.remove("fade");
      }, 800);
    };
  </script>
</body>
</html>
