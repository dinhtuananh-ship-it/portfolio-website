<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugatti Chiron</title>
    <link rel="icon" href="img/logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="CSS.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            padding: 20px;
        }
        img {
            width: 50%;
            border-radius: 10px;
        }
        a {
            color: #ffcc00;
            font-size: 20px;
            text-decoration: none;
        }
        .purchase-form {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background: #333;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .purchase-form h2 {
            color: #ffcc00;
            margin-bottom: 20px;
        }
        .purchase-form label {
            display: block;
            margin: 10px 0 5px;
            color: #ffcc00;
            text-align: left;
        }
        .purchase-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #222;
            color: white;
            font-size: 16px;
        }
        .purchase-form button {
            width: 100%;
            padding: 10px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            color: #111;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .purchase-form button:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>
    <h1>Bugatti Chiron</h1>
    <img src="img/bugatti.jpg" alt="Bugatti Chiron">
    <p><strong>Xuất xứ:</strong> Pháp</p>
    <p><strong>Giá:</strong> 3 triệu USD</p>
    <p><strong>Tốc độ tối đa:</strong> 420 km/h</p>
    <p><strong>Động cơ:</strong> W16 8.0L Quad-Turbo</p>
    <p><strong>Công suất:</strong> 1500 mã lực</p>

    <!-- Form đặt hàng -->
    <div class="purchase-form">
        <h2>Đặt hàng</h2>
        <form id="orderForm">
            <label for="name">Họ và tên:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="address">Địa chỉ:</label>
            <input type="text" id="address" name="address" required>

            <label for="quantity">Số lượng:</label>
            <input type="number" id="quantity" name="quantity" min="1" required>

            <button type="submit">Đặt hàng</button>
        </form>
    </div>

    <script>
        // Xử lý form đặt hàng bằng JavaScript
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Ngăn chặn form gửi đi theo cách thông thường

            // Lấy dữ liệu từ form
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const quantity = document.getElementById('quantity').value;

            // Hiển thị thông báo đặt hàng thành công
            alert(`Đặt hàng thành công!\n\nThông tin đơn hàng:\nHọ và tên: ${name}\nEmail: ${email}\nSố điện thoại: ${phone}\nĐịa chỉ: ${address}\nSố lượng: ${quantity}`);

            // Reset form sau khi đặt hàng thành công
            document.getElementById('orderForm').reset();
        });
    </script>
    <a href="SIÊU XE.html">Quay lại</a>
</body>
</html>
