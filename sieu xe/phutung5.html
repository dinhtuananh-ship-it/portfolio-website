<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phụ tùng 5</title>
    <link rel="icon" href="img/logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="CSS.css">
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <img src="img/logo.jpg" alt="Logo">
            <div class="slogan">Nơi hội tụ những siêu xe đỉnh cao</div>
        </div>
        <div class="auth-links">
            <a href="dangnhap.html">Đăng nhập</a>
            <a href="dangky.html">Đăng ký</a>
        </div>
    </div>

    <div class="part-detail">
        <h1>Phụ tùng 5</h1>
        <img src="img/part5.png" alt="Phụ tùng 1">
        <p><strong>Mô tả:</strong> Phụ tùng chính hãng cho Pagani Huayra</p>
        <p><strong>Giá:</strong> 2.000 USD</p>
        <p><strong>Bảo hành:</strong> 12 tháng</p>

        <!-- Form mua hàng -->
        <div class="purchase-form">
            <h2>Mua hàng</h2>
            <form>
                <label for="name">Họ và tên:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="address">Địa chỉ:</label>
                <input type="text" id="address" name="address" required>

                <label for="quantity">Số lượng:</label>
                <input type="number" id="quantity" name="quantity" min="1" required>

                <button type="submit">Đặt hàng</button>
            </form>
        </div>
    </div>

    <a href="SIÊU XE.html" class="back-link">Quay lại</a>
</body>
</html>
